id: require-exported-function-return-type
language: TypeScript
rule:
  all:
    - kind: function_declaration
      inside:
        kind: export_statement
        stopBy: end
    - not:
        any:
          - pattern: 'function $_($$$): $_ { $$$ }'
          - pattern: 'function $_<$$$>($$$): $_ { $$$ }'
message: "Exported functions must have explicit return type annotations."
severity: warning
