id: no-for-loop-array-build
language: TypeScript
rule:
  any:
    - kind: for_in_statement
      has:
        pattern: $ARR.push($$$VALS)
        stopBy: end
    - kind: for_statement
      has:
        pattern: $ARR.push($$$VALS)
        stopBy: end
message: "Use `map`/`filter` pipelines for collectionâ†’collection transforms, not for loops with push."
severity: warning