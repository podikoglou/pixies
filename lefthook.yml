assert_lefthook_installed: true

pre-commit:
  piped: true
  jobs:
    - name: format
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: node_modules/.bin/oxfmt --write {staged_files}
      stage_fixed: true
    - name: typecheck
      run: bun run typecheck
    - name: lint
      glob: "*.{js,jsx,ts,tsx,mjs,cjs}"
      run: node_modules/.bin/oxlint {staged_files}
