services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  pixies:
    build: .
    environment:
      PIXIES_DB_FILE: /app/data/pixies.db
    env_file: ".env"
    volumes:
      - pixies-data:/app/data
    restart: unless-stopped

volumes:
  pixies-data:
  caddy-data:
  caddy-config:
